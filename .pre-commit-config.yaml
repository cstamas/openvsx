exclude: '^((cli|webui)/.yarn|server/src/main/resources/db/migration)'
repos:
- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v6.0.0
  hooks:
#    - id: check-yaml
    - id: end-of-file-fixer
    - id: mixed-line-ending
    - id: trailing-whitespace
#- repo: https://github.com/Lucas-C/pre-commit-hooks
#  rev: v1.5.5
#  hooks:
#    - id: insert-license
#      name: Add license for all Java files
#      files: ^server/.*\.java$
#      args:
#        - --comment-style
#        - "/*| *| */"
#        - --license-filepath
#        - LICENSE-template.txt
#        - --fuzzy-match-generates-todo
- repo: https://github.com/shellcheck-py/shellcheck-py
  rev: v0.11.0.1
  hooks:
  -   id: shellcheck
- repo: https://github.com/woodruffw/zizmor-pre-commit
  rev: v1.26.1
  hooks:
    - id: zizmor
      args: [ --min-severity, low ]
- repo: local
  hooks:
    - id: lint
      name: webui -> eslint & prettier
      entry: bash -c 'cd webui && yarn lint' --
      language: system
      require_serial: true
      files: ^webui/
      types: [file]
