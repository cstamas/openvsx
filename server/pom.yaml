modelEncoding: UTF-8
modelVersion: 4.0.0

parent:
  artifactId: spring-boot-starter-parent
  groupId: org.springframework.boot
  version: 4.0.7

groupId: org.eclipse.openvsx
artifactId: server
version: 1.0.3-SNAPSHOT

properties:
  # encoding
  project.build.sourceEncoding: UTF-8
  project.reporting.outputEncoding: UTF-8
  # reproducible
  project.build.outputTimestamp: '2026-06-24T16:10:19Z'
  # compilation
  maven.compiler.release: 25
  maven.compiler.parameters: true
  maven.compiler.showDeprecation: true
  maven.compiler.proc: none
  # core plugins lockdown
  maven-clean-plugin.version: 3.5.0
  maven-enforcer-plugin.version: 3.6.3
  maven-resources-plugin.version: 3.5.0
  maven-compiler-plugin.version: 3.15.0
  maven-source-plugin.version: 3.4.0
  maven-javadoc-plugin.version: 3.12.0
  maven-jar-plugin.version: 3.5.0
  maven-surefire-plugin.version: 3.5.6
  maven-failsafe-plugin.version: 3.5.6
  maven-install-plugin.version: 3.1.4
  maven-deploy-plugin.version: 3.1.4
  # other plugins
  maven-antrun-plugin.version: 3.2.0
  maven-assembly-plugin.version: 3.8.0
  maven-dependency-plugin.version: 3.11.0
  maven-help-plugin.version: 3.5.1
  maven-shade-plugin.version: 3.6.2

