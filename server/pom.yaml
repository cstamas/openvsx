build:
  plugins:
    - groupId: org.apache.maven.plugins
      artifactId: maven-enforcer-plugin
      executions:
        - configuration:
            rules:
              requireJavaVersion:
                version: '[25,)'
                message: Java 25 or higher is required to build this project.
              requireMavenVersion:
                version: '[3.9,)'
                message: Maven 3.9 or higher is required to build this project.
          goals:
            - enforce
          id: enforce-environment
          inherited: true
          phase: validate
          priority: 0
    - groupId: org.apache.maven.plugins
      artifactId: maven-compiler-plugin
      executions:
        - configuration:
            compileSourceRoots:
              - '${project.basedir}/src/main/java'
              - '${project.basedir}/src/main/jooq-gen'
          goals:
            - compile
          id: default-compile
          inherited: true
          phase: compile
          priority: 0
    - groupId: org.apache.maven.plugins
      artifactId: maven-surefire-plugin
      configuration:
        redirectTestOutputToFile: true
        forkCount: 2C
        argLine: '--enable-native-access=ALL-UNNAMED -Xmx4096m -Xshare:off'
    - groupId: org.springframework.boot
      artifactId: spring-boot-maven-plugin
      configuration:
        mainClass: org.eclipse.openvsx.RegistryApplication

